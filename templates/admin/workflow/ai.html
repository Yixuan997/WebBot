{% extends "admin/base.html" %}

{% block title %}AI 生成工作流 - {{ system.title }}{% endblock %}
{% block page_title %}AI 生成工作流{% endblock %}

{% block content %}
<div class="row g-3">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">AI 生成工作流</h3>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleConfigPanel()">配置</button>
            </div>
            <div class="card-body p-0">
                <div id="configPanel" class="border-bottom bg-body-tertiary p-3 d-none">
                    <div class="row g-2">
                        <div class="col-12 col-lg-4">
                            <label class="form-label">API Base URL</label>
                            <input type="text" class="form-control" id="ai_base_url" placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="col-12 col-lg-4">
                            <label class="form-label">API Key / Token</label>
                            <input type="password" class="form-control" id="ai_api_key" placeholder="sk-...">
                        </div>
                        <div class="col-12 col-lg-4">
                            <label class="form-label">Model</label>
                            <input type="text" class="form-control" id="ai_model" placeholder="gpt-5">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button type="button" class="btn btn-sm btn-primary" onclick="saveAiConfig()">保存配置</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="clearAiConfig()">清空配置</button>
                    </div>
                </div>

                <div id="resultAlert" class="alert d-none m-3 mb-0"></div>

                <div id="chatStream" class="p-3 border-bottom bg-white overflow-auto" style="height:58vh;min-height:420px;"></div>

                <div class="p-3">
                    <textarea class="form-control" id="ai_prompt" rows="4" placeholder="例如：用户发送“签到”时，记录签到次数并回复累计次数。"></textarea>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small class="text-muted">单会话模式，不保存历史消息。</small>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-secondary" id="cancelGenerateBtn" onclick="cancelGenerate()" disabled>停止</button>
                            <button type="button" class="btn btn-primary" id="generateBtn" onclick="generateWorkflow()">发送并生成</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const AI_STORAGE_KEY = 'workflow_ai_config_v1';
const WELCOME_PROMPTS = [
    '做一个签到工作流：发送“签到”后累计次数并回复',
    '做一个关键词回复：命中“菜单”返回功能列表',
    '做一个群通知：管理员发送指令后群发文本',
    '做一个定时播报：每天 08:00 推送天气和一句话',
    '做一个链接解析：识别抖音链接并返回结果',
    '做一个入群欢迎：新成员进群后自动发送欢迎语'
];
let latestWorkflow = null;
let generateAbortController = null;

function showAlert(type, message) {
    const el = document.getElementById('resultAlert');
    el.className = `alert alert-${type} m-3 mb-0`;
    el.textContent = message;
    el.classList.remove('d-none');
}

function hideAlert() {
    const el = document.getElementById('resultAlert');
    el.classList.add('d-none');
}

function escapeHtml(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function scrollChatToBottom() {
    const stream = document.getElementById('chatStream');
    stream.scrollTop = stream.scrollHeight;
}

function appendChatMessage(role, html) {
    hideWelcomeState();
    const stream = document.getElementById('chatStream');
    const row = document.createElement('div');
    row.className = `chat-message-row d-flex flex-column mb-3 ${role === 'user' ? 'align-items-end' : 'align-items-start'}`;
    const bubbleClass = role === 'user'
        ? 'bg-success text-white'
        : 'bg-white border text-body';
    row.innerHTML = `
        <div class="rounded p-2 shadow-sm ${bubbleClass}" style="max-width:min(88%,900px);word-break:break-word;">${html}</div>
    `;
    stream.appendChild(row);
    scrollChatToBottom();
    return row.querySelector('div');
}

function setChatMessageContent(target, html) {
    if (!target) return;
    target.innerHTML = html;
    scrollChatToBottom();
}

function hasChatMessages() {
    return document.querySelectorAll('#chatStream .chat-message-row').length > 0;
}

function hideWelcomeState() {
    const welcome = document.getElementById('chatWelcome');
    if (welcome) {
        welcome.remove();
    }
}

function renderWelcomeState() {
    if (hasChatMessages()) return;
    const stream = document.getElementById('chatStream');
    const chipsHtml = WELCOME_PROMPTS.map((prompt) => `
        <button
            type="button"
            class="btn btn-sm btn-outline-secondary rounded-pill px-3"
            data-prompt="${escapeHtml(prompt)}"
            onclick="applyExamplePrompt(this.dataset.prompt)"
        >${escapeHtml(prompt)}</button>
    `).join('');

    stream.innerHTML = `
        <div id="chatWelcome" class="h-100 d-flex align-items-center justify-content-center px-2">
            <div class="w-100 text-center" style="max-width:980px;">
                <div class="fs-2 fw-bold mb-2">有什么我能帮你的吗？</div>
                <div class="text-secondary mb-4">描述你的需求，我会为你生成工作流。</div>
                <div class="d-flex flex-wrap justify-content-center gap-2" style="max-width:900px;margin:0 auto;">
                    ${chipsHtml}
                </div>
            </div>
        </div>
    `;
}

async function applyExamplePrompt(promptText) {
    const promptEl = document.getElementById('ai_prompt');
    if (!promptEl) return;
    promptEl.value = String(promptText || '').trim();
    if (!promptEl.value) {
        promptEl.focus();
        return;
    }
    if (document.getElementById('generateBtn').disabled) return;
    await generateWorkflow();
}

function setChatActionButtons(target, html) {
    if (!target || !target.parentElement) return;
    const row = target.parentElement;
    let actionWrap = row.querySelector('.chat-action-wrap');
    const content = String(html || '').trim();
    if (!content) {
        if (actionWrap) actionWrap.remove();
        return;
    }
    if (!actionWrap) {
        actionWrap = document.createElement('div');
        actionWrap.className = 'chat-action-wrap mt-2 d-flex gap-2 flex-wrap';
        row.appendChild(actionWrap);
    }
    actionWrap.innerHTML = content;
    scrollChatToBottom();
}

function extractJsonText(rawText) {
    const raw = String(rawText || '').trim();
    if (!raw) return '';
    const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
    if (fenced && fenced[1]) {
        return fenced[1].trim();
    }
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start >= 0 && end > start) {
        return raw.slice(start, end + 1).trim();
    }
    return '';
}

function buildJsonBubble(jsonText) {
    return `<pre class="mb-0 p-2 rounded bg-dark text-white" style="max-height:360px;overflow:auto;">${escapeHtml(jsonText)}</pre>`;
}

function buildCollapsedCodeBlock(codeText, label = '查看代码') {
    return `<details class="mt-2"><summary class="text-muted small" style="cursor:pointer;user-select:none;">${escapeHtml(label)}</summary><div class="mt-2">${buildJsonBubble(codeText)}</div></details>`;
}

function isLikelyJsonText(text) {
    const raw = String(text || '').trim();
    if (!raw) return false;
    if ((raw.startsWith('{') && raw.endsWith('}')) || (raw.startsWith('[') && raw.endsWith(']'))) {
        try {
            JSON.parse(raw);
            return true;
        } catch (e) {
            return false;
        }
    }
    return false;
}

function renderPlainText(text) {
    return `<div style="white-space:pre-wrap;word-break:break-word;">${escapeHtml(text)}</div>`;
}

function renderWorkflowReadyBubble() {
    return `<div>工作流已生成并通过校验。</div>`;
}

function renderWorkflowActionButtons() {
    return `
        <button type="button" class="btn btn-sm btn-success rounded-pill px-3" onclick="createWorkflow(this)">创建工作流</button>
    `;
}

function renderAssistantOutput(rawText) {
    const raw = String(rawText || '').trim();
    if (!raw) return '';

    if (isLikelyJsonText(raw)) {
        return buildCollapsedCodeBlock(raw, '查看工作流');
    }

    const fenceRegex = /```([a-zA-Z0-9_-]+)?\s*([\s\S]*?)\s*```/g;
    let html = '';
    let lastIndex = 0;
    let match = null;

    while ((match = fenceRegex.exec(raw)) !== null) {
        const before = raw.slice(lastIndex, match.index).trim();
        if (before) html += renderPlainText(before);
        const lang = (match[1] || '').toLowerCase();
        const code = match[2] || '';
        if (lang === 'json' || isLikelyJsonText(code)) {
            html += buildCollapsedCodeBlock(code, '查看工作流');
        } else {
            html += buildCollapsedCodeBlock(code, '查看代码');
        }
        lastIndex = fenceRegex.lastIndex;
    }

    const tail = raw.slice(lastIndex).trim();
    if (tail) html += renderPlainText(tail);

    if (!html) {
        return renderPlainText(raw);
    }
    return html;
}

function parseWorkflowFromResponse(data) {
    if (data && data.workflow && typeof data.workflow === 'object') {
        return data.workflow;
    }
    const extracted = extractJsonText(data?.raw_output || '');
    if (!extracted) return null;
    try {
        const parsed = JSON.parse(extracted);
        return parsed && typeof parsed === 'object' ? parsed : null;
    } catch (e) {
        return null;
    }
}

function setGeneratingState(generating) {
    const btn = document.getElementById('generateBtn');
    const cancelBtn = document.getElementById('cancelGenerateBtn');
    btn.disabled = generating;
    btn.textContent = generating ? '加载中，请稍候...' : '发送并生成';
    cancelBtn.disabled = !generating;
}

function toggleConfigPanel() {
    const panel = document.getElementById('configPanel');
    panel.classList.toggle('d-none');
}

function saveAiConfig() {
    const payload = {
        base_url: document.getElementById('ai_base_url').value.trim(),
        api_key: document.getElementById('ai_api_key').value.trim(),
        model: document.getElementById('ai_model').value.trim()
    };
    localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(payload));
}

function loadAiConfig() {
    const raw = localStorage.getItem(AI_STORAGE_KEY);
    if (!raw) return;
    try {
        const cfg = JSON.parse(raw);
        document.getElementById('ai_base_url').value = cfg.base_url || '';
        document.getElementById('ai_api_key').value = cfg.api_key || '';
        document.getElementById('ai_model').value = cfg.model || '';
    } catch (e) {
        console.error('loadAiConfig error', e);
    }
}

function clearAiConfig() {
    localStorage.removeItem(AI_STORAGE_KEY);
    document.getElementById('ai_base_url').value = '';
    document.getElementById('ai_api_key').value = '';
    document.getElementById('ai_model').value = '';
}

function cancelGenerate() {
    if (generateAbortController) {
        generateAbortController.abort();
    }
}

function parseSseEventBlock(block) {
    const lines = String(block || '').split('\n');
    let eventName = 'message';
    const dataLines = [];
    for (const line of lines) {
        if (!line) continue;
        if (line.startsWith('event:')) {
            eventName = line.slice(6).trim() || 'message';
            continue;
        }
        if (line.startsWith('data:')) {
            dataLines.push(line.slice(5).trimStart());
        }
    }
    if (!dataLines.length) return null;
    const rawData = dataLines.join('\n');
    try {
        return {event: eventName, payload: JSON.parse(rawData)};
    } catch (e) {
        return {event: eventName, payload: {message: rawData}};
    }
}

async function generateWorkflow() {
    hideAlert();
    latestWorkflow = null;

    const payload = {
        base_url: document.getElementById('ai_base_url').value.trim(),
        api_key: document.getElementById('ai_api_key').value.trim(),
        model: document.getElementById('ai_model').value.trim(),
        prompt: document.getElementById('ai_prompt').value.trim()
    };

    if (!payload.base_url || !payload.api_key || !payload.model || !payload.prompt) {
        showAlert('danger', '请完整填写 API 地址、Token、模型和需求描述。');
        return;
    }

    const promptEl = document.getElementById('ai_prompt');
    saveAiConfig();
    appendChatMessage('user', escapeHtml(payload.prompt).replace(/\n/g, '<br>'));
    if (promptEl) {
        promptEl.value = '';
        promptEl.focus();
    }
    const assistantBubble = appendChatMessage(
        'assistant',
        '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>加载中，请稍候...'
    );

    generateAbortController = new AbortController();
    setGeneratingState(true);

    try {
        const response = await fetch('{{ url_for("Admin.workflow_ai_generate_stream") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            signal: generateAbortController.signal
        });
        if (!response.ok) {
            const text = await response.text();
            setChatMessageContent(assistantBubble, `请求失败：HTTP ${response.status} ${escapeHtml(text || '')}`);
            return;
        }
        if (!response.body) {
            setChatMessageContent(assistantBubble, '请求失败：流式响应不可用。');
            return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let assistantRaw = '';
        let donePayload = null;
        let errorMessage = '';

        const handleSseBlock = (block) => {
            const eventData = parseSseEventBlock(block);
            if (!eventData) return;
            const eventName = eventData.event;
            const payloadObj = eventData.payload || {};

            if (eventName === 'delta') {
                const text = String(payloadObj.text || '');
                if (!text) return;
                assistantRaw += text;
                setChatMessageContent(assistantBubble, renderAssistantOutput(assistantRaw));
                return;
            }
            if (eventName === 'error') {
                errorMessage = String(payloadObj.message || errorMessage || '');
                return;
            }
            if (eventName === 'done') {
                donePayload = payloadObj;
            }
        };

        while (true) {
            const {value, done} = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), {stream: !done});
            buffer = buffer.replace(/\r\n/g, '\n');

            let boundaryIndex = buffer.indexOf('\n\n');
            while (boundaryIndex >= 0) {
                const block = buffer.slice(0, boundaryIndex).trim();
                buffer = buffer.slice(boundaryIndex + 2);
                if (block) {
                    handleSseBlock(block);
                }
                boundaryIndex = buffer.indexOf('\n\n');
            }

            if (done) break;
        }

        if (buffer.trim()) {
            handleSseBlock(buffer.trim());
        }

        const data = donePayload;
        if (!data) {
            if (assistantRaw.trim()) {
                setChatMessageContent(assistantBubble, renderAssistantOutput(assistantRaw));
            } else {
                setChatMessageContent(assistantBubble, errorMessage ? escapeHtml(errorMessage) : '生成失败：流式响应未完成。');
            }
            return;
        }

        if (!data.success) {
            const recoveredWorkflow = parseWorkflowFromResponse(data);
            if (recoveredWorkflow) {
                let detailHtml = renderPlainText('检测到结构化输出，但未通过服务端校验。');
                if (data.raw_output) {
                    detailHtml += `
                        <details class="mt-2">
                            <summary class="text-muted" style="cursor:pointer;">查看原始输出</summary>
                            ${renderAssistantOutput(data.raw_output)}
                        </details>
                    `;
                }
                setChatMessageContent(assistantBubble, detailHtml);
                setChatActionButtons(assistantBubble, '');
                return;
            }

            if (assistantRaw.trim()) {
                setChatMessageContent(assistantBubble, renderAssistantOutput(assistantRaw));
            } else if (data.raw_output) {
                setChatMessageContent(assistantBubble, renderAssistantOutput(data.raw_output));
            } else {
                setChatMessageContent(assistantBubble, `生成失败：${escapeHtml(data.message || errorMessage || '未知错误')}`);
            }
            setChatActionButtons(assistantBubble, '');
            return;
        }

        latestWorkflow = data.workflow || parseWorkflowFromResponse(data);
        if (latestWorkflow) {
            const finalText = String(assistantRaw || data.raw_output || '').trim();
            if (finalText) {
                setChatMessageContent(assistantBubble, renderAssistantOutput(finalText));
            } else {
                setChatMessageContent(assistantBubble, renderWorkflowReadyBubble());
            }
            setChatActionButtons(assistantBubble, renderWorkflowActionButtons());
            return;
        }

        if (assistantRaw.trim()) {
            setChatMessageContent(assistantBubble, renderAssistantOutput(assistantRaw));
        } else if (data.raw_output) {
            setChatMessageContent(assistantBubble, renderAssistantOutput(data.raw_output));
        } else {
            setChatMessageContent(assistantBubble, '生成完成，但未返回可展示内容。');
        }
        setChatActionButtons(assistantBubble, '');
    } catch (e) {
        if (e.name === 'AbortError') {
            setChatMessageContent(assistantBubble, '本次生成已停止。');
        } else {
            console.error(e);
            setChatMessageContent(assistantBubble, '请求失败，请检查网络或接口配置。');
        }
        setChatActionButtons(assistantBubble, '');
    } finally {
        generateAbortController = null;
        setGeneratingState(false);
    }
}

async function createWorkflow(triggerBtn = null) {
    if (!latestWorkflow) {
        showAlert('danger', '请先生成并通过校验。');
        return;
    }

    const btn = (triggerBtn && typeof triggerBtn === 'object') ? triggerBtn : null;
    const oldText = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '创建中...';
    }

    try {
        const response = await fetch('{{ url_for("Admin.workflow_ai_create") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({workflow: latestWorkflow})
        });
        const data = await response.json();
        if (!data.success) {
            showAlert('danger', data.message || '创建失败');
            if (btn) {
                btn.disabled = false;
                btn.textContent = oldText || '创建工作流';
            }
            return;
        }
        appendChatMessage('assistant', '工作流已创建，正在跳转到编辑页面...');
        if (data.edit_url) {
            window.location.href = data.edit_url;
        }
    } catch (e) {
        console.error(e);
        showAlert('danger', '创建失败，请稍后重试。');
        if (btn) {
            btn.disabled = false;
            btn.textContent = oldText || '创建工作流';
        }
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadAiConfig();
    renderWelcomeState();
    const promptEl = document.getElementById('ai_prompt');
    if (promptEl) {
        promptEl.addEventListener('keydown', (event) => {
            if (event.key !== 'Enter' || event.shiftKey) return;
            event.preventDefault();
            if (!document.getElementById('generateBtn').disabled) {
                generateWorkflow();
            }
        });
    }
});
</script>
{% endblock %}
