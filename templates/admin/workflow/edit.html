{% extends "admin/base.html" %}

{% block title %}编辑工作流 - {{ system.title }}{% endblock %}
{% block page_title %}编辑工作流: {{ workflow.name }}{% endblock %}

{% block content %}
<style>
.workflow-canvas {
    background: radial-gradient(circle at 20% 20%, #ffffff 0%, #f7f9fd 40%, #f2f5fb 100%);
    border: 1px solid #dfe6f2;
    border-radius: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
    min-height: 70vh;
    overflow: hidden;
    position: relative;
}
#drawflowCanvas {
    width: 100%;
    height: 72vh;
    min-height: 560px;
    position: relative;
}
.drawflow,
#drawflowCanvas .drawflow {
    width: 100%;
    height: 100%;
}
#drawflowCanvas .drawflow-node {
    background: transparent;
    border: none;
    box-shadow: none;
    width: 292px;
    min-width: 292px;
}
#drawflowCanvas .drawflow-node .drawflow_content_node {
    width: 100%;
    height: 100%;
}
#drawflowCanvas .drawflow-node.selected .wf-card-node {
    box-shadow: 0 0 0 2px rgba(47, 111, 236, 0.35), 0 6px 18px rgba(16, 24, 40, 0.16);
}
#drawflowCanvas .drawflow-node .inputs,
#drawflowCanvas .drawflow-node .outputs {
    z-index: 20;
}
#drawflowCanvas .drawflow .connection .main-path {
    stroke: #8a99b3;
    stroke-width: 2px;
}
#drawflowCanvas .drawflow {
    transform-origin: 0 0;
    -webkit-transform-origin: 0 0;
}
#drawflowCanvas .wf-card-node {
    width: 100%;
    min-height: 86px;
    border-radius: 12px;
    border: 1px solid #dbe2ee;
    background: #fff;
    overflow: hidden;
}
#drawflowCanvas .wf-card-head {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 0 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
}
#drawflowCanvas .wf-card-title,
#drawflowCanvas .wf-card-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
#drawflowCanvas .wf-card-title {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#drawflowCanvas .wf-card-icon {
    width: 20px;
    height: 20px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.22);
    font-size: 12px;
}
#drawflowCanvas .wf-card-badge,
#drawflowCanvas .wf-card-id {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    line-height: 1;
}
#drawflowCanvas .wf-card-badge {
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
}
#drawflowCanvas .wf-card-id {
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2px;
    background: rgba(255,255,255,0.24);
    color: #fff;
    font-family: Monaco, Consolas, "Courier New", monospace;
}
#drawflowCanvas .wf-card-body {
    min-height: 50px;
    padding: 10px 12px;
    font-size: 13px;
    color: #334155;
    display: flex;
    align-items: center;
}
.workflow-hint {
    position: absolute;
    left: 12px;
    bottom: 12px;
    z-index: 20;
    font-size: 12px;
    color: #62748b;
    background: rgba(255,255,255,0.92);
    border: 1px solid #dce3ee;
    border-radius: 10px;
    padding: 6px 10px;
}
.workflow-viewport-tools {
    position: absolute;
    right: 12px;
    bottom: 12px;
    z-index: 20;
    display: flex;
    gap: 6px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid #dce3ee;
    border-radius: 10px;
    padding: 6px;
}
.workflow-debug-panel {
    position: absolute;
    top: 12px;
    right: 12px;
    width: min(380px, calc(100% - 24px));
    max-height: calc(100% - 80px);
    overflow: auto;
    z-index: 25;
    background: rgba(255,255,255,0.98);
    border: 1px solid #dce3ee;
    border-radius: 12px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    display: none;
}
.workflow-debug-panel .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #e8edf5;
    font-weight: 600;
}
.workflow-debug-panel .body {
    padding: 10px 12px 12px;
    font-size: 12px;
}
.workflow-debug-panel pre {
    margin: 0;
    border-radius: 8px;
    padding: 8px;
    background: #0f172a;
    color: #f8fafc;
    max-height: 220px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
}
.workflow-canvas-loading {
    position: absolute;
    inset: 0;
    z-index: 35;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(1px);
}
@media (max-width: 991.98px) {
    .workflow-canvas {
        min-height: 50vh;
    }
    #drawflowCanvas {
        height: 62vh;
        min-height: 420px;
    }
}
</style>
<form id="workflowForm" onsubmit="submitWorkflow(event)">
    <div class="row g-3 workflow-layout">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">{{ workflow.name }}</h3>
                    <div class="card-actions">
                        <span class="badge bg-blue-lt text-blue me-1">总节点 <span id="totalNodesCount">0</span></span>
                        <span class="badge bg-azure-lt text-azure me-2">业务节点 <span id="businessNodesCount">0</span></span>
                        <button type="button" class="btn btn-sm btn-outline-cyan me-1" onclick="loadDebugRecord()" title="加载最近一次执行的调试信息">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 9v-1a3 3 0 0 1 6 0v1" /><path d="M8 9h8a6 6 0 0 1 1 3v3a5 5 0 0 1 -10 0v-3a6 6 0 0 1 1 -3" /></svg>
                            调试
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1" onclick="addNode()">
                            <svg class="icon" fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16"><path d="M0 0h24v24H0z" fill="none" stroke="none"/><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
                            添加
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1" onclick="moveSelectedNodeUp()">上移</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1" onclick="moveSelectedNodeDown()">下移</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1" onclick="editSelectedNode()">编辑选中</button>
                        <button type="button" class="btn btn-sm btn-outline-danger me-1" onclick="deleteSelectedNode()">删除选中</button>
                        <button type="submit" class="btn btn-sm btn-primary me-1">
                            <svg class="icon" fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16"><path d="M0 0h24v24H0z" fill="none" stroke="none"/><path d="M6 4h10l4 4v10a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2"/><path d="M12 14m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/></svg>
                            保存
                        </button>
                        <a href="{{ url_for('Admin.workflow_detail', workflow_id=workflow.id) }}" class="btn btn-sm btn-outline-secondary">取消</a>
                    </div>
                </div>
                <div class="card-body">
                    <div class="workflow-canvas">
                        <div id="drawflowCanvas"></div>
                        <div id="workflowCanvasLoading" class="workflow-canvas-loading">
                            <div class="text-center">
                                <div class="spinner-border text-primary mb-2" role="status" aria-hidden="true"></div>
                                <div class="text-muted small">正在加载工作流...</div>
                            </div>
                        </div>
                        <div id="nodeDebugPanel" class="workflow-debug-panel">
                            <div class="head">
                                <span>节点调试详情</span>
                                <button type="button" class="btn btn-sm btn-ghost-secondary" onclick="hideNodeDebugPanel()">关闭</button>
                            </div>
                            <div class="body" id="nodeDebugPanelBody"></div>
                        </div>
                        <div class="workflow-hint">分支线显示：满足 / 不满足</div>
                        <div class="workflow-viewport-tools">
                            <button type="button" class="btn btn-sm btn-outline-secondary" title="缩小" onclick="zoomOut()">-</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" title="放大" onclick="zoomIn()">+</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" title="适应画布" onclick="zoomFit()">⤢</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/drawflow/drawflow.min.css') }}" />
<script src="{{ url_for('static', filename='vendor/drawflow/drawflow.min.js') }}"></script>
<script>
window.WORKFLOW_PAGE_DATA = {
    availableNodes: {{ available_nodes|tojson }},
    existingWorkflow: {{ config.get('workflow', [])|tojson }},
    existingProtocols: {{ config.get('protocols', [])|tojson }},
    workflowId: {{ workflow.id }}
};
</script>
<script src="{{ url_for('static', filename='js/workflow.js') }}"></script>
{% endblock %}
